<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysian's Decree | The Fourth Seal</title>
  <style>
    :root {
      --bg: #0e0b09;
      --panel: rgba(20, 14, 10, 0.92);
      --border: #5b4331;
      --gold: #c8a56a;
      --red: #8f1f1f;
      --red-bright: #b32b2b;
      --text: #e7dcc8;
      --muted: #b7a78d;
      --success: #d8b36a;
      --shadow: rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(120, 40, 20, 0.18), transparent 35%),
        linear-gradient(180deg, #19110d 0%, #0d0907 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 760px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px var(--shadow);
      padding: 32px 28px;
      border-radius: 10px;
      text-align: center;
    }

    .crest {
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      font-weight: 600;
      color: var(--gold);
      line-height: 1.1;
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 580px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .chest {
      font-size: 72px;
      margin: 6px 0 18px;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.45));
      transition: transform 0.35s ease;
    }

    .chest.open {
      transform: scale(1.08);
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: var(--muted);
      text-align: left;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    input[type="text"] {
      width: 100%;
      max-width: 320px;
      padding: 16px 18px;
      border-radius: 8px;
      border: 1px solid #6f5640;
      background: #120d0a;
      color: var(--text);
      font-size: 26px;
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.35);
    }

    input[type="text"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 165, 106, 0.15);
    }

    .button-row {
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: none;
      background: linear-gradient(180deg, var(--red-bright), var(--red));
      color: #f8eee1;
      padding: 14px 28px;
      font-size: 17px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.4);
    }

    button:hover {
      filter: brightness(1.06);
    }

    .message {
      margin-top: 24px;
      min-height: 90px;
      padding: 18px;
      border: 1px solid rgba(200, 165, 106, 0.18);
      background: rgba(0, 0, 0, 0.16);
      border-radius: 8px;
      line-height: 1.7;
      color: var(--muted);
    }

    .success-title {
      color: var(--success);
      font-size: 24px;
      margin-bottom: 10px;
    }

    .claim-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #7a5a2a;
      background: rgba(199, 156, 82, 0.08);
      border-radius: 8px;
      color: #f1ddb0;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .small-note {
      margin-top: 16px;
      font-size: 13px;
      color: #9d8c73;
    }

    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: #8f7e66;
    }

    @media (max-width: 640px) {
      .panel {
        padding: 26px 18px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 16px;
      }

      .chest {
        font-size: 60px;
      }

      input[type="text"] {
        font-size: 22px;
        letter-spacing: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="crest">Elysian's Decree</div>
      <div id="chest" class="chest">🧰</div>
      <h1>The Fourth Seal</h1>
      <p class="subtitle">
        Four signs were hidden across Sanctuary. Only those who gather them in the true order may break the final seal and claim the treasure within.
      </p>

      <label class="label" for="sealCode">Enter the 4-digit seal code</label>
      <input
        id="sealCode"
        type="text"
        maxlength="4"
        inputmode="numeric"
        autocomplete="off"
        placeholder="----"
      />

      <div class="button-row">
        <button id="unlockBtn">Break the Seal</button>
      </div>

      <div id="message" class="message">
        The chest is shut. The iron has not yet yielded.
      </div>

      <div class="footer">
        Present the claim phrase to the keeper of the prize.
      </div>
    </div>
  </div>

  <script>
    const correctCode = "3586";
    const claimPhrase = "Fourth Seal";

    const input = document.getElementById("sealCode");
    const button = document.getElementById("unlockBtn");
    const message = document.getElementById("message");
    const chest = document.getElementById("chest");

    function revealResult() {
      const entered = input.value.trim();

      if (entered === correctCode) {
        chest.classList.add("open");
        chest.textContent = "🪙";
        message.innerHTML = `
          <div class="success-title">The chest opens.</div>
          <div>The final lock gives way, and the hidden prize is revealed.</div>
          <div class="claim-box">${claimPhrase}</div>
          <div class="small-note">Show this phrase to the host to claim your reward.</div>
        `;
      } else {
        chest.classList.remove("open");
        chest.textContent = "🧰";
        message.innerHTML = `
          <div class="success-title" style="color:#b86a6a;">The seal rejects you.</div>
          <div>The code is false. Gather the signs again and return when your path is true.</div>
        `;
      }
    }

    button.addEventListener("click", revealResult);

    input.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        revealResult();
      }
    });

    input.addEventListener("input", function () {
      this.value = this.value.replace(/[^0-9]/g, "");
    });
  </script>
</body>
</html>
